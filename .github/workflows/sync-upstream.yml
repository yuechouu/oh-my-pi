name: Sync Upstream

on:
  schedule:
    # 每周一早上 9 点 UTC (北京时间 17 点)
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync upstream main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Add upstream if not exists
          git remote add upstream https://github.com/can1357/oh-my-pi.git 2>/dev/null || true

          # Fetch upstream
          git fetch upstream main

          # Merge upstream/main into main
          git checkout main
          git merge upstream/main --no-edit --strategy-option theirs || {
            echo "⚠️ Merge conflict, creating PR instead"
            git merge --abort
            exit 0
          }

          # Push updated main
          git push origin main

      - name: Rebase patched branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Rebase patched onto updated main
          git checkout patched
          git rebase main --strategy-option theirs || {
            echo "⚠️ Rebase conflict, manual intervention needed"
            git rebase --abort
            exit 0
          }

          # Force push rebased patched
          git push origin patched --force-with-lease
