name: Sync Upstream

on:
  schedule:
    # 每小时检查一次上游是否有更新
    - cron: '17 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Check and sync upstream
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Add upstream if not exists
          git remote add upstream https://github.com/can1357/oh-my-pi.git 2>/dev/null || true

          # Fetch upstream
          git fetch upstream main

          # 比较本地 main 和上游 main，没更新就跳过
          LOCAL=$(git rev-parse main)
          UPSTREAM=$(git rev-parse upstream/main)
          if [ "$LOCAL" = "$UPSTREAM" ]; then
            echo "✅ No upstream changes, skipping."
            exit 0
          fi

          echo "🔄 Upstream updated: $LOCAL → $UPSTREAM"

          # Merge upstream/main into main
          git checkout main
          git merge upstream/main --no-edit --strategy-option theirs || {
            echo "⚠️ Merge conflict, manual intervention needed"
            git merge --abort
            exit 1
          }

          # Push updated main
          git push origin main

      - name: Rebase patched branch
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Rebase patched onto updated main
          git checkout patched
          git rebase main --strategy-option theirs || {
            echo "⚠️ Rebase conflict, manual intervention needed"
            git rebase --abort
            exit 1
          }

          # Force push rebased patched
          git push origin patched --force-with-lease

          echo "✅ Synced: main and patched are up to date with upstream."
