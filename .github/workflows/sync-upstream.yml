name: Sync upstream to patched

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/can1357/oh-my-pi.git || true

      - name: Fetch upstream main
        run: git fetch upstream main --tags

      # Step 1: upstream main → fork main
      - name: Check for new upstream commits
        id: check
        run: |
          UPSTREAM=$(git rev-parse upstream/main)
          MERGE_BASE=$(git merge-base HEAD upstream/main)
          if [ "$UPSTREAM" = "$MERGE_BASE" ]; then
            echo "already_up_to_date=true" >> "$GITHUB_OUTPUT"
            echo "✅ main is already up to date with upstream"
          else
            echo "already_up_to_date=false" >> "$GITHUB_OUTPUT"
            NEW_COMMITS=$(git rev-list --count "$MERGE_BASE".."$UPSTREAM")
            echo "📥 Found $NEW_COMMITS new commit(s) from upstream"
          fi

      - name: Merge upstream into main
        if: steps.check.outputs.already_up_to_date == 'false'
        run: |
          git merge upstream/main --no-edit --no-ff \
            -m "sync: merge upstream/main into main"

      - name: Push main
        if: steps.check.outputs.already_up_to_date == 'false'
        run: git push origin main

      # Step 2: fork main → patched
      - name: Merge main into patched
        if: steps.check.outputs.already_up_to_date == 'false'
        run: |
          git checkout patched
          git merge main --no-edit --no-ff \
            -m "sync: merge main into patched"

      - name: Push patched
        if: steps.check.outputs.already_up_to_date == 'false'
        run: git push origin patched

      # Step 3: bump tag and trigger Publish Patched
      - name: Create release tag
        if: steps.check.outputs.already_up_to_date == 'false'
        id: tag
        run: |
          # Get upstream version from package.json on patched
          UPSTREAM_VER=$(node -p "require('./package.json').version")
          # Find latest patched.N tag for this upstream version
          LATEST=$(git tag -l "v${UPSTREAM_VER}-patched.*" --sort=-v:refname | head -1)
          if [ -z "$LATEST" ]; then
            NEXT=1
          else
            CURRENT=$(echo "$LATEST" | grep -oP 'patched\.\K\d+')
            NEXT=$((CURRENT + 1))
          fi
          NEW_TAG="v${UPSTREAM_VER}-patched.${NEXT}"
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "🏷️ Creating tag $NEW_TAG on patched"
          git tag "$NEW_TAG" patched
          git push origin "$NEW_TAG"
