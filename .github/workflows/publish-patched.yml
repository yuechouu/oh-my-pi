name: Publish Patched

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: patched

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Rewrite scope and resolve catalog
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          # Step 0: Replace @oh-my-pi/ with @yuechou/ in source imports
          find packages -name "*.ts" -exec sed -i 's|@oh-my-pi/|@yuechou/|g' {} +
          find packages -name "*.tsx" -exec sed -i 's|@oh-my-pi/|@yuechou/|g' {} +

          # Step 1: Replace @oh-my-pi/ with @yuechou/ in ALL package.json
          find packages -name "package.json" -exec sed -i 's|"@oh-my-pi/|"@yuechou/|g' {} +

          # Step 2: Use node to resolve catalog: and fix versions
          node -e "
            const fs = require('fs');
            const path = require('path');
            const tagVersion = process.env.VERSION; // e.g. v15.8.3-patched.3
            const version = tagVersion.replace(/^v/, '');

            // Read root and rewrite catalog
            const root = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            let catalog = root.workspaces?.catalog || {};

            // Build new catalog: rewrite scope + update @yuechou/* internal versions to this tag
            const newCatalog = {};
            for (const [k, v] of Object.entries(catalog)) {
              const key = k.replace('@oh-my-pi/', '@yuechou/');
              // Update internal @yuechou/* packages to match this release version
              if (key.startsWith('@yuechou/')) {
                newCatalog[key] = version;
              } else {
                newCatalog[key] = v;
              }
            }
            catalog = newCatalog;

            // Update root package.json catalog
            root.workspaces.catalog = newCatalog;
            fs.writeFileSync('package.json', JSON.stringify(root, null, 2) + '\n');
            console.log('Updated root catalog');

            // Process each package
            const dirs = fs.readdirSync('packages').filter(d =>
              fs.existsSync(path.join('packages', d, 'package.json'))
            );

            for (const dir of dirs) {
              const fpath = path.join('packages', dir, 'package.json');
              let pkg = JSON.parse(fs.readFileSync(fpath, 'utf8'));

              for (const depType of ['dependencies', 'devDependencies', 'peerDependencies']) {
                if (!pkg[depType]) continue;
                for (const [name, ver] of Object.entries(pkg[depType])) {
                  if (ver === 'catalog:') {
                    if (catalog[name]) {
                      pkg[depType][name] = catalog[name];
                    } else {
                      console.log('WARNING: no catalog entry for ' + name);
                    }
                  }
                }
              }

              pkg.version = version;
              fs.writeFileSync(fpath, JSON.stringify(pkg, null, '\t') + '\n');
              console.log('Rewrote: ' + fpath + ' -> ' + pkg.name + '@' + version);
            }
          "

      - name: Build
        run: bun run build 2>/dev/null || echo "No build script, using source directly"

      - name: Configure npm auth
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Publish to npm
        run: |
          for pkg in packages/*/; do
            if [ -f "$pkg/package.json" ]; then
              PKG_NAME=$(node -p "require('./$pkg/package.json').name")
              echo "Publishing $PKG_NAME..."
              cd "$pkg"
              npm publish --access public 2>&1 || echo "Failed to publish $PKG_NAME (may already exist)"
              cd ../..
            fi
          done
